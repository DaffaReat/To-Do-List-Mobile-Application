<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To-Do App</title>

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-dim: #888888;
            --primary: #bb86fc;
            --border: #333333;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px; /* Space for FAB */
        }

        header {
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        /* The Tree Structure */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Indent nested lists, draw a subtle vertical guideline */
        ul ul {
            padding-left: 24px;
            border-left: 1px solid var(--border);
            margin-left: 12px;
        }

        .node-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            min-height: 48px; /* Thumb-friendly tap target */
        }

        /* Expand/Collapse Chevron */
        .expand-btn {
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            padding: 0;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Checkbox styling */
        .status-box {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-dim);
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--bg);
        }

        .status-box.done {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .node-title {
            flex-grow: 1;
            font-size: 16px;
        }

        .node-title.done {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        /* Floating Action Button (FAB) */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background-color: var(--primary);
            color: var(--bg);
            font-size: 32px;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>Agenda</header>

    <ul id="tree-root"></ul>

    <button class="fab" onclick="promptNewTask()">+</button>

    <script>
        // --- API Wrapper ---
        async function callPython(func, payload = {}) {
            const resStr = await webui.call(func, JSON.stringify(payload));
            const res = JSON.parse(resStr);
            if (!res.ok) throw new Error(res.error);
            return res.data;
        }

        // --- DOM Elements ---
        const treeRoot = document.getElementById('tree-root');

        // --- App Logic ---
        async function initApp() {
            try {
                // Fetch top-level nodes on load [cite: 22]
                const rootNodes = await callPython('get_root_nodes');
                rootNodes.forEach(node => {
                    treeRoot.appendChild(createNodeElement(node));
                });
            } catch (err) {
                console.error("Failed to load root nodes:", err);
            }
        }

        // Recursive function to build a single Task Row + its children container
        function createNodeElement(node) {
            const li = document.createElement('li');
            li.id = `node-${node.id}`;

            const row = document.createElement('div');
            row.className = 'node-row';

            // 1. Expand/Collapse Button
            const expandBtn = document.createElement('button');
            expandBtn.className = 'expand-btn';
            expandBtn.innerHTML = '▶'; // Right arrow

            // 2. Checkbox (Optimistic Update)
            const statusBox = document.createElement('div');
            statusBox.className = `status-box ${node.state === 'DONE' ? 'done' : ''}`;
            statusBox.innerHTML = node.state === 'DONE' ? '✓' : '';

            // 3. Title
            const titleSpan = document.createElement('span');
            titleSpan.className = `node-title ${node.state === 'DONE' ? 'done' : ''}`;
            titleSpan.innerText = node.title;

            // Children container (hidden by default)
            const childrenContainer = document.createElement('ul');
            childrenContainer.style.display = 'none';
            let childrenLoaded = false;

            // --- Event Listeners ---

            // Toggle Status
            statusBox.addEventListener('click', async () => {
                const isDone = statusBox.classList.contains('done');
                const newState = isDone ? 'TODO' : 'DONE';

                // Optimistic UI update (feels instant on mobile)
                statusBox.classList.toggle('done');
                titleSpan.classList.toggle('done');
                statusBox.innerHTML = newState === 'DONE' ? '✓' : '';

                // Background API call
                try {
                    await callPython('update_node', { id: node.id, state: newState });
                } catch (err) {
                    // Revert if Python fails
                    alert("Failed to save!");
                    statusBox.classList.toggle('done');
                    titleSpan.classList.toggle('done');
                }
            });

            // Expand / Lazy-Load Children [cite: 29]
            expandBtn.addEventListener('click', async () => {
                const isExpanded = childrenContainer.style.display === 'block';

                if (isExpanded) {
                    childrenContainer.style.display = 'none';
                    expandBtn.innerHTML = '▶';
                } else {
                    childrenContainer.style.display = 'block';
                    expandBtn.innerHTML = '▼';

                    // Lazy load children from SQLite only if we haven't yet
                    if (!childrenLoaded) {
                        expandBtn.innerHTML = '...'; // Loading state
                        try {
                            const children = await callPython('get_children', { parent_id: node.id });
                            children.forEach(child => {
                                childrenContainer.appendChild(createNodeElement(child));
                            });
                            childrenLoaded = true;
                            expandBtn.innerHTML = '▼';
                        } catch (err) {
                            console.error("Failed to load children", err);
                            expandBtn.innerHTML = '▶';
                        }
                    }
                }
            });

            row.appendChild(expandBtn);
            row.appendChild(statusBox);
            row.appendChild(titleSpan);

            li.appendChild(row);
            li.appendChild(childrenContainer);

            return li;
        }

        // Quick Capture
        async function promptNewTask() {
            const title = prompt("New Task:");
            if (!title) return;

            try {
                const newNode = await callPython('create_node', { title: title });
                treeRoot.appendChild(createNodeElement(newNode));
            } catch (err) {
                alert("Failed to create task");
            }
        }

        // Boot the app once the WebUI bridge is ready
        document.addEventListener("DOMContentLoaded", () => {
            // Slight delay to ensure WebUI object is injected by the Python backend
            setTimeout(initApp, 100);
        });
    </script>
</body>
</html>
